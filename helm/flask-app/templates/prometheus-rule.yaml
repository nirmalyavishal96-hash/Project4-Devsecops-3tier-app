apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-alerts
  namespace: default
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: flask-app.rules
      rules:
        - alert: HighCPUUsage
          expr: cpu_usage_percent > 70
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on Flask app"
            description: "CPU usage is above 70% for more than 1 minute"