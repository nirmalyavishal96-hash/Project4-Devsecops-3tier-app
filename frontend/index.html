<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps App</title>
</head>
<body>
    <h1>DevSecOps 3-Tier Application</h1>
    <button onclick="checkHealth()">Check Backend</button>

    <p id="result"></p>

    <script>
        function checkHealth() {
            fetch("/api/health")
                .then(res => res.json())
                .then(data => {
                    document.getElementById("result").innerText = JSON.stringify(data);
                })
                .catch(err => {
                    document.getElementById("result").innerText = "Error connecting backend";
                });
        }
    </script>
</body>
</html>
